<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Gestionnaire de Photos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .photo-card:hover .delete-btn {
            opacity: 1;
        }

        .modal-animate {
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <!-- Header & Navigation -->
    <header class="bg-white border-b sticky top-0 z-30 px-6 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">PhotoGallery</h1>
            </div>

            <div class="flex flex-1 max-w-md mx-4">
                <div class="relative w-full">
                    <input type="text" id="searchInput" placeholder="Rechercher une photo..." 
                        class="w-full pl-10 pr-4 py-2 border rounded-full focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-3 top-2.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <button onclick="toggleModal('addModal', true)" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-semibold transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                Ajouter
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6">
        <!-- Stats/Info -->
        <div id="noResults" class="hidden flex flex-col items-center justify-center py-20 text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <p class="text-xl">Aucune photo trouvée.</p>
        </div>

        <div id="photoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Les photos seront injectées ici -->
        </div>
    </main>

    <!-- Modal: Ajouter une photo -->
    <div id="addModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden modal-animate">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-bold">Ajouter une photo</h3>
                <button onclick="toggleModal('addModal', false)" class="text-slate-400 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Titre de l'image</label>
                    <input type="text" id="imgTitle" placeholder="Ex: Vacances à la mer" 
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Source (URL)</label>
                    <input type="text" id="imgUrl" placeholder="https://..." 
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-200"></span></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">Ou</span></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Télécharger un fichier</label>
                    <input type="file" id="imgFile" accept="image/*" 
                        class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
            </div>
            <div class="px-6 py-4 bg-slate-50 border-t flex justify-end gap-3">
                <button onclick="toggleModal('addModal', false)" class="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded-lg font-medium transition-colors">Annuler</button>
                <button onclick="addNewPhoto()" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition-colors">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Modal: Lightbox (Visionnage) -->
    <div id="lightboxModal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-center justify-center p-4" onclick="toggleModal('lightboxModal', false)">
        <button class="absolute top-6 right-6 text-white/70 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <div class="max-w-5xl max-h-[90vh] flex flex-col items-center">
            <img id="lightboxImg" src="" alt="Plein écran" class="max-w-full max-h-[80vh] object-contain rounded shadow-2xl">
            <h2 id="lightboxTitle" class="text-white text-2xl mt-6 font-semibold"></h2>
        </div>
    </div>

    <!-- Notifications Toast -->
    <div id="notification" class="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl translate-y-20 opacity-0 transition-all duration-300 z-[100]">
        Action effectuée avec succès !
    </div>

    <script>
        // État de l'application
        let photos = [
            { id: 1, title: "Nature Paisible", url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000&auto=format&fit=crop", date: new Date().toLocaleDateString() },
            { id: 2, title: "Montagnes Enneigées", url: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1000&auto=format&fit=crop", date: new Date().toLocaleDateString() },
            { id: 3, title: "Ville de Nuit", url: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=1000&auto=format&fit=crop", date: new Date().toLocaleDateString() },
            { id: 4, title: "Plage Tropicale", url: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1000&auto=format&fit=crop", date: new Date().toLocaleDateString() }
        ];

        const photoGrid = document.getElementById('photoGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');

        // Initialisation
        function init() {
            renderPhotos(photos);
        }

        // Afficher les photos
        function renderPhotos(data) {
            photoGrid.innerHTML = '';
            
            if (data.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                data.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = "photo-card group relative bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100";
                    card.innerHTML = `
                        <div class="relative overflow-hidden aspect-square cursor-pointer" onclick="openLightbox('${photo.url}', '${photo.title}')">
                            <img src="${photo.url}" alt="${photo.title}" 
                                class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                                onerror="this.src='https://via.placeholder.com/400x400?text=Image+non+disponible'">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                                <span class="text-white text-sm font-medium">Cliquer pour agrandir</span>
                            </div>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-slate-800 truncate">${photo.title}</h3>
                            <p class="text-xs text-slate-400 mt-1">Ajouté le ${photo.date}</p>
                            <button onclick="deletePhoto(${photo.id})" class="delete-btn absolute top-2 right-2 bg-white/90 hover:bg-red-500 hover:text-white p-2 rounded-full shadow-lg opacity-0 transition-all duration-200">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    `;
                    photoGrid.appendChild(card);
                });
            }
        }

        // Ajouter une photo
        async function addNewPhoto() {
            const titleInput = document.getElementById('imgTitle');
            const urlInput = document.getElementById('imgUrl');
            const fileInput = document.getElementById('imgFile');
            
            let finalUrl = urlInput.value.trim();
            const title = titleInput.value.trim() || "Sans titre";

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    addPhotoToList(title, e.target.result);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else if (finalUrl) {
                addPhotoToList(title, finalUrl);
            } else {
                showNotification("Veuillez fournir une image", "bg-orange-500");
                return;
            }

            // Reset UI
            titleInput.value = '';
            urlInput.value = '';
            fileInput.value = '';
            toggleModal('addModal', false);
        }

        function addPhotoToList(title, url) {
            const newPhoto = {
                id: Date.now(),
                title: title,
                url: url,
                date: new Date().toLocaleDateString()
            };
            photos.unshift(newPhoto);
            renderPhotos(photos);
            showNotification("Photo ajoutée !");
        }

        // Supprimer une photo
        function deletePhoto(id) {
            photos = photos.filter(p => p.id !== id);
            renderPhotos(photos);
            showNotification("Photo supprimée", "bg-red-500");
        }

        // Rechercher
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = photos.filter(p => p.title.toLowerCase().includes(term));
            renderPhotos(filtered);
        });

        // Modals
        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function openLightbox(url, title) {
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxTitle = document.getElementById('lightboxTitle');
            lightboxImg.src = url;
            lightboxTitle.innerText = title;
            toggleModal('lightboxModal', true);
        }

        // Notification
        function showNotification(message, bgColor = "bg-slate-800") {
            const toast = document.getElementById('notification');
            toast.innerText = message;
            toast.className = `fixed bottom-6 right-6 ${bgColor} text-white px-6 py-3 rounded-lg shadow-xl transition-all duration-300 z-[100] opacity-100 translate-y-0`;
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                toast.classList.add('translate-y-20');
            }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
